<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e3350d" />
  <meta name="description" content="일본 PJCS 출전용 포켓몬 카드게임 용어·인사말 빠른 검색" />
  <title>PJCS 포켓몬 용어집</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="title-row">
      <button id="menuBtn" class="menu-btn" aria-label="메뉴">☰</button>
      <h1>⚡ PJCS 포켓몬 용어집</h1>
      <span class="header-actions">
        <button id="installBtn" class="install-btn" hidden>앱 설치</button>
      </span>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="한국어·일본어·발음으로 검색" aria-label="검색" />
      <button id="clearSearch" class="clear-btn" aria-label="검색어 지우기" hidden>✕</button>
    </div>
    <nav class="chips" id="chips" aria-label="카테고리"></nav>
  </header>

  <main>
    <p id="resultCount" class="result-count" aria-live="polite"></p>
    <ul id="list" class="term-list"></ul>
    <p id="empty" class="empty" hidden>결과가 없어요. 다른 말로 검색해 보세요.</p>
  </main>

  <footer class="app-footer">
    <span>오프라인에서도 동작해요 · 일본 대회 화이팅! 🔥</span>
  </footer>

  <script src="./js/nav.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
