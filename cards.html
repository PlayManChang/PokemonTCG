<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a64d4" />
  <meta name="description" content="일본 PJCS 메타 덱 카드를 한국어로 — 기술·특성 설명" />
  <title>카드 검색 · PJCS 포켓몬 용어집</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="cards-page">
  <header class="app-header header-blue">
    <div class="title-row">
      <button id="menuBtn" class="menu-btn" aria-label="메뉴">☰</button>
      <h1>🃏 카드 검색</h1>
      <span class="header-spacer"></span>
    </div>
    <div id="controls">
      <div class="mode-toggle">
        <button id="modeDeck" class="mode-btn active">덱별</button>
        <button id="modeSet" class="mode-btn">세트별</button>
      </div>
      <div id="deckSelectors">
        <nav class="chips tier-row" id="tierRow" aria-label="티어"></nav>
        <select id="deckSelect" class="dropdown" aria-label="덱 선택"></select>
      </div>
      <div id="setSelectors" hidden>
        <select id="setSelect" class="dropdown" aria-label="세트 선택"></select>
      </div>
      <p id="deckInfo" class="deck-info"></p>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="카드 이름·기술·효과로 검색" aria-label="검색" />
      <button id="clearSearch" class="clear-btn" aria-label="검색어 지우기" hidden>✕</button>
    </div>
    <nav class="chips" id="chips" aria-label="카드 종류"></nav>
  </header>

  <main>
    <p id="resultCount" class="result-count" aria-live="polite"></p>
    <ul id="list" class="pcard-list"></ul>
    <p id="empty" class="empty" hidden>결과가 없어요. 다른 말로 검색해 보세요.</p>
  </main>

  <footer class="app-footer">
    <span>현재 환경 상위 덱 기준 · 일본어를 못 읽어도 기술·특성을 한국어로! 🔥</span>
  </footer>

  <script src="./config.js"></script>
  <script src="./js/nav.js"></script>
  <script src="./js/cards.js"></script>
</body>
</html>
